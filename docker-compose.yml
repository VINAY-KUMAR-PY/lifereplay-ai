services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      FRONTEND_URL: http://localhost:5173
      DATA_DIR: /app/data
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
